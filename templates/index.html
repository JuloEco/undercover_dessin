<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Suspekt — Jeu de dessin undercover</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f13;
      --surface: #1a1a22;
      --surface2: #22222e;
      --border: #2e2e3e;
      --text: #e8e8f0;
      --muted: #7a7a9a;
      --accent: #ff4d6d;
      --accent2: #7c5cbf;
      --chalk: #f0ede6;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      overflow: hidden;
      -webkit-overflow-scrolling: touch; 
    /* Autorise le défilement vertical si le contenu dépasse */
    overflow-y: auto; 
    /* Évite les débordements horizontaux parasites */
    overflow-x: hidden; 
    /* Utilise la vraie hauteur visible sur mobile */
    min-height: -webkit-fill-available;
    }

    /* Animated chalk particles */
    canvas#bg-canvas {
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 0;
      opacity: 0.15;
    }

    .page {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      padding: 2rem;
    }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(4rem, 12vw, 9rem);
      letter-spacing: 0.08em;
      line-height: 1;
      color: var(--chalk);
      text-shadow:
        3px 3px 0 var(--accent),
        6px 6px 0 var(--accent2),
        0 0 80px rgba(255,77,109,0.3);
      position: relative;
    }

    .logo::after {
      content: '?';
      position: absolute;
      right: -0.3em;
      top: -0.1em;
      font-size: 0.5em;
      color: var(--accent);
      animation: blink 2s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }

    .tagline {
      font-family: 'Space Mono', monospace;
      font-size: 0.8rem;
      color: var(--muted);
      letter-spacing: 0.25em;
      text-transform: uppercase;
      margin-top: 0.5rem;
      margin-bottom: 2.5rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 1.8rem;
    }

    .tab-btn {
      background: transparent;
      border: none;
      color: var(--muted);
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      padding: 0.7rem;
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
    }
    .tab-btn.active {
      background: var(--accent);
      color: #fff;
    }
    .tab-btn:first-child { border-right: 1px solid var(--border); }

    .tab-panel { display: none; flex-direction: column; gap: 1rem; }
    .tab-panel.active { display: flex; }

    label {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.3rem;
      display: block;
    }

    input[type="text"] {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 0.95rem;
      padding: 0.75rem 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus { border-color: var(--accent); }
    input[type="text"]::placeholder { color: var(--muted); }

    .btn {
      width: 100%;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.3rem;
      letter-spacing: 0.1em;
      padding: 0.75rem;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 0.4rem;
    }
    .btn:hover { filter: brightness(1.15); transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn.secondary {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .rules {
      margin-top: 1.5rem;
      font-size: 0.78rem;
      color: var(--muted);
      text-align: center;
      line-height: 1.7;
    }
    .rules strong { color: var(--accent); }

    .error-msg {
      color: var(--accent);
      font-size: 0.82rem;
      font-family: 'Space Mono', monospace;
      text-align: center;
      min-height: 1.2em;
    }
  </style>
</head>
<body>
<canvas id="bg-canvas"></canvas>

<div class="page">
  <div class="logo">Suspekt</div>
  <div class="tagline">Le dessin collaboratif avec un traître parmi vous</div>

  <div class="card">
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('create')">Créer</button>
      <button class="tab-btn" onclick="switchTab('join')">Rejoindre</button>
    </div>

    <!-- CREATE -->
    <div class="tab-panel active" id="tab-create">
      <div>
        <label for="create-name">Ton pseudo</label>
        <input type="text" id="create-name" placeholder="Ex : DaVinci" maxlength="20" />
      </div>
      <div class="error-msg" id="create-error"></div>
      <button class="btn" onclick="createRoom()">Créer un salon</button>
    </div>

    <!-- JOIN -->
    <div class="tab-panel" id="tab-join">
      <div>
        <label for="join-name">Ton pseudo</label>
        <input type="text" id="join-name" placeholder="Ex : Picasso" maxlength="20" />
      </div>
      <div>
        <label for="join-code">Code du salon</label>
        <input type="text" id="join-code" placeholder="Ex : XKZAB" maxlength="5" style="text-transform:uppercase;letter-spacing:0.3em;" />
      </div>
      <div class="error-msg" id="join-error"></div>
      <button class="btn" onclick="joinRoom()">Rejoindre</button>
    </div>
  </div>

  <div class="rules">
    <strong>Comment jouer ?</strong><br>
    Tous les joueurs reçoivent le même mot… sauf un.<br>
    Chacun dessine à tour de rôle sur le canvas commun.<br>
    Votez pour éliminer l'imposteur avant qu'il ne gagne !
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
<script>
  const socket = io();

  // ── Chalk particle background ──────────────────────────────────────────
  const bgCanvas = document.getElementById('bg-canvas');
  const bgCtx = bgCanvas.getContext('2d');
  let particles = [];

  function resizeBg() {
    bgCanvas.width = window.innerWidth;
    bgCanvas.height = window.innerHeight;
  }
  resizeBg();
  window.addEventListener('resize', resizeBg);

  function spawnParticle() {
    const colors = ['#ff4d6d','#7c5cbf','#4ECDC4','#FFE66D','#f0ede6'];
    return {
      x: Math.random() * bgCanvas.width,
      y: bgCanvas.height + 10,
      vx: (Math.random() - 0.5) * 0.8,
      vy: -(Math.random() * 1.5 + 0.5),
      size: Math.random() * 3 + 1,
      color: colors[Math.floor(Math.random() * colors.length)],
      life: 1,
      decay: Math.random() * 0.003 + 0.001,
    };
  }

  for (let i = 0; i < 40; i++) {
    const p = spawnParticle();
    p.y = Math.random() * bgCanvas.height;
    particles.push(p);
  }

  function animateBg() {
    bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
    if (Math.random() < 0.15) particles.push(spawnParticle());
    particles = particles.filter(p => p.life > 0);
    for (const p of particles) {
      p.x += p.vx; p.y += p.vy; p.life -= p.decay;
      bgCtx.globalAlpha = p.life;
      bgCtx.fillStyle = p.color;
      bgCtx.beginPath();
      bgCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      bgCtx.fill();
    }
    bgCtx.globalAlpha = 1;
    requestAnimationFrame(animateBg);
  }
  animateBg();

  // ── Tab logic ──────────────────────────────────────────────────────────
  function switchTab(tab) {
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    event.currentTarget.classList.add('active');
  }

  // ── Socket ─────────────────────────────────────────────────────────────
  // ── Socket ─────────────────────────────────────────────────────────────
  function createRoom() {
    const name = document.getElementById('create-name').value.trim();
    if (!name) { document.getElementById('create-error').textContent = 'Entre ton pseudo !'; return; }
    document.getElementById('create-error').textContent = '';
    
    // On envoie le pseudo pour la création
    socket.emit('create_room', { nickname: name });
  }

  function joinRoom() {
    const name = document.getElementById('join-name').value.trim();
    const code = document.getElementById('join-code').value.trim().toUpperCase();
    if (!name) { document.getElementById('join-error').textContent = 'Entre ton pseudo !'; return; }
    if (!code) { document.getElementById('join-error').textContent = 'Entre le code du salon !'; return; }
    document.getElementById('join-error').textContent = '';
    
    // CORRECTION ICI : On utilise explicitement la clé 'room_id' attendue par Flask[cite: 12]
    
  
  // ICI : Il essaie de RE-ÉMETTRE un 'join_room_event' !
  socket.emit('join_room_event', {
    nickname: name,
    room_id: code
});
  };

  socket.on('room_created', (data) => {
    const name = document.getElementById('create-name').value.trim();
    window.location.href = `/room/${data.room_id}?nickname=${encodeURIComponent(name)}`;
  });

  socket.on('joined_room', (data) => {
    window.location.href = `/room/${data.room_id}?nickname=${encodeURIComponent(data.nickname)}`;
  });

  socket.on('error', (data) => {
    const active = document.querySelector('.tab-panel.active');
    const errId = active.id === 'tab-create' ? 'create-error' : 'join-error';
    document.getElementById(errId).textContent = data.message;
  });

  // Enter key
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const active = document.querySelector('.tab-panel.active');
      if (active.id === 'tab-create') createRoom();
      else joinRoom();
    }
  });
</script>
</body>
</html>
